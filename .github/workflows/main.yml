name: ci

on:
  push:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3 # Updated to v3 (most stable)
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5 # This is the action that does the work
        with:
          push: true
          # This is where you use your dynamic tags
          tags: |
            prathamnirmale/boardgame:latest
            prathamnirmale/boardgame:${{ github.sha }}
            prathamnirmale/boardgame:v${{ github.run_number }}
